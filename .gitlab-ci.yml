# Cấu hình tối ưu cho GitLab Runner chạy trên Windows (PowerShell)
image: mcr.microsoft.com/dotnet/sdk:8.0

stages:
  - build
  - deploy

variables:
  AZURE_WEBAPP_NAME: "AEMS" # Tên Web App trên Azure
  RESOURCE_GROUP: "SWP391_Group1"
  PROJECT_PATH: "AEMS_Solution/AEMS_Solution.csproj"

# --- 1. BUILD Stage ---
build_app:
  stage: build
  script:
    - echo "=== BẮT ĐẦU BUILD (WINDOWS/POWERSHELL) ==="
    - dotnet restore "$PROJECT_PATH"
    - dotnet build "$PROJECT_PATH" -c Release --no-restore
    - dotnet publish "$PROJECT_PATH" -c Release -o ./publish --no-build
    # Lệnh nén file bằng PowerShell (cho Windows Runner)
    - if (Test-Path publish.zip) { Remove-Item publish.zip }
    - Compress-Archive -Path ./publish/* -DestinationPath ./publish.zip -Force
    - echo "=== BUILD XONG! ==="
  artifacts:
    paths:
      - publish.zip
    expire_in: 1 day
  only:
    - main
    - develop
    - merge_requests

# --- 2. DEPLOY Stage ---
deploy_to_azure:
  stage: deploy
  # Note: Image bị bỏ qua khi dùng Shell Runner trên Windows
  script:
    - echo "=== ĐANG DEPLOY LÊN AZURE WEB APP ==="
    - az login --service-principal -u "$AZURE_CLIENT_ID" -p "$AZURE_CLIENT_SECRET" --tenant "$AZURE_TENANT_ID"
    - az webapp deployment source config-zip --resource-group "$RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --src publish.zip
    - echo "=== DEPLOY HOÀN TẤT! ==="
  dependencies:
    - build_app
  only:
    - main
    - develop