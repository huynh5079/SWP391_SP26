# Cấu hình CI/CD Tối ưu: Tự đóng gói Runtime (Self-Contained) để tránh lỗi 500.31 trên Azure
image: mcr.microsoft.com/dotnet/sdk:8.0

stages:
  - build
  - deploy

variables:
  AZURE_WEBAPP_NAME: "AEMS" # Tên Web App trên Azure
  RESOURCE_GROUP: "SWP391_Group1"
  PROJECT_PATH: "AEMS_Solution/AEMS_Solution.csproj"

# --- 1. BUILD Stage ---
build_app:
  stage: build
  script:
    - echo "=== BẮT ĐẦU BUILD (SELF-CONTAINED WIN-X64) ==="
    - dotnet restore "$PROJECT_PATH"
    # Publish kèm theo Runtime win-x64 và nén tất cả thư viện cần thiết vào thư mục publish
    - dotnet publish "$PROJECT_PATH" -c Release -o ./publish -r win-x64 --self-contained true
    # Lệnh nén file bằng PowerShell (cho Windows Runner)
    - if (Test-Path publish.zip) { Remove-Item publish.zip }
    - Compress-Archive -Path ./publish/* -DestinationPath ./publish.zip -Force
    - echo "=== BUILD XONG! ==="
  artifacts:
    paths:
      - publish.zip
    expire_in: 1 day
  only:
    - main
    - develop
    - merge_requests

# --- 2. DEPLOY Stage ---
deploy_to_azure:
  stage: deploy
  script:
    - echo "=== ĐANG DEPLOY LÊN AZURE WEB APP ==="
    - az login --service-principal -u "$env:AZURE_CLIENT_ID" -p "$env:AZURE_CLIENT_SECRET" --tenant "$env:AZURE_TENANT_ID"
    - az webapp deployment source config-zip --resource-group "$RESOURCE_GROUP" --name "$AZURE_WEBAPP_NAME" --src publish.zip
    - echo "=== DEPLOY HOÀN TẤT! ==="
  dependencies:
    - build_app
  only:
    - main
    - develop